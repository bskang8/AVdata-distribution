# EXP-001 재현 파라미터 스냅샷
experiment_id: EXP-001
date_completed: 2026-06-02
status: completed

dataset:
  total_clips: 299180
  source_dir: /Data1/home/bskang/cds-data/captions
  caption_length:
    min: 55
    max: 4085
    mean: 337.7

index:
  bm25:
    backend: bm25s
    version: "0.2.12"
    artifact: data/index/bm25s_index/
  embedding:
    model: BAAI/bge-m3
    dim: 1024
    artifact_npy: data/index/embeddings.npy      # 1.2 GB
    artifact_hnsw: data/index/hnsw.index         # 1.3 GB
    hnsw_M: 32
    hnsw_ef_construction: 200
    hnsw_ef_search: 128

odd_tagging:
  method: regex_only          # LLM fallback 미사용
  artifact: data/tags/odd_tags.json
  coverage: data/tags/odd_coverage.json
  coverage_pct:
    agent_type: 100.0
    ego_action: 100.0
    road_type: 96.7
    hazard_level: 84.7
    time_of_day: 62.7
    weather: 52.9
    traffic_density: 37.4

distribution_analysis:
  method: umap_cosine
  n_neighbors: 15
  min_dist: 0.1
  artifact_html: data/index/distribution.html    # 40 MB
  artifact_parquet: data/index/umap_coords.parquet  # 17 MB
  longtail_clips: data/index/longtail_clips.json    # 14,959개 (밀도 하위 5%)

evaluation:
  n_queries: 20
  ground_truth_method: keyword_relevance   # 약지도(weak supervision)
  min_relevant_per_query: 2
  eval_set: data/eval/eval_set.json
  metrics:
    - Recall@5
    - MRR@5
    - Latency_ms
  results: experiments/EXP-001/results/metrics.csv
